<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Headerr Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white border-b border-gray-200 py-4 text-center">
        <a href="/" class="text-3xl font-teko font-bold uppercase text-black">Secure Checkout</a>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
            <h2 class="text-xl font-bold uppercase mb-4">Shipping Details</h2>
            <form method="POST" action="/checkout" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-700 mb-1">Full Delivery Address</label>
                    <textarea name="address" required rows="3" class="w-full border border-gray-300 rounded px-4 py-3 text-sm focus:border-black" placeholder="123 Football Lane, City, Zip..."></textarea>
                </div>
                <div class="bg-blue-50 text-blue-800 p-4 rounded text-sm font-medium">
                    Payment Method: Cash on Delivery / Pay on Confirmation
                </div>
                <button type="submit" class="w-full bg-black text-white py-4 rounded font-bold uppercase hover:bg-zinc-800 transition">Place Order</button>
            </form>
        </div>

        <div>
            <h2 class="text-xl font-bold uppercase mb-4">Order Summary</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="space-y-4 mb-4 border-b pb-4">
                    {% for item in cart_items %}
                    <div class="flex justify-between text-sm">
                        <span>{{ item.quantity }}x {{ item.jersey.name }}</span>
                        <span class="font-bold">Rs. {{ "%.2f"|format(item.subtotal) }}</span>
                    </div>
                    {% endfor %}
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold uppercase">Grand Total</span>
                    <span class="text-2xl font-black text-red-600">Rs. {{ "%.2f"|format(total) }}</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
