<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Kit | Headerr Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-center">
    <div class="max-w-md w-full mx-auto p-6 bg-white border border-gray-200 rounded-2xl shadow-sm">
        <h2 class="text-2xl font-bold uppercase text-center mb-6">Edit Kit</h2>
        
        <form method="POST" action="/admin/edit_jersey/{{ jersey.id }}" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Jersey Name</label>
                <input type="text" name="name" value="{{ jersey.name }}" required class="w-full border p-3 rounded-xl text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Price (Rs.)</label>
                <input type="number" step="0.01" name="price" value="{{ jersey.price }}" required class="w-full border p-3 rounded-xl text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Category</label>
                <select name="category" class="w-full border p-3 rounded-xl text-sm bg-white">
                    <option value="National" {% if jersey.category == 'National' %}selected{% endif %}>National</option>
                    <option value="Club" {% if jersey.category == 'Club' %}selected{% endif %}>Club</option>
                    <option value="Retro" {% if jersey.category == 'Retro' %}selected{% endif %}>Retro</option>
                    <option value="General" {% if jersey.category == 'General' %}selected{% endif %}>General</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-sm mt-4 hover:bg-zinc-800">Save Changes</button>
            <a href="/admin" class="block text-center text-xs font-bold text-gray-500 uppercase mt-4 hover:underline">Cancel</a>
        </form>
    </div>
</body>
</html>
